name: Axiom-60 Statcast Refresh
on:
  schedule:
    - cron: '0 8 * * *' # 8:00 AM UTC (4:00 AM ET)
  workflow_dispatch: # Allows manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pybaseball pandas

      - name: Run Scraper
        run: python scripts/refresh_statcast.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Axiom-60-Bot"
          git config --global user.email "bot@axiom60.com"
          git add data/latest_statcast.csv
          git commit -m "Automated Statcast Update: $(date +'%Y-%m-%d')"
          git push